name: Deploy do site de apresentação da Biblioteca

on:
  push:
    branches: ["main"] # Verifique se a sua branch principal é main ou master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site' # IMPORTANTE: Publica apenas a pasta 'site' que acabamos de criar
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4